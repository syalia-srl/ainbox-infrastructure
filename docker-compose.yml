version: "3.8"

# Plantilla base (YAML Anchor)
x-superbot-base: &base
  image: ${IMAGE_TAG:-superbot:latest}
  restart: unless-stopped
  ports:
    - "${PORT_LLM:-8080}:8080"
    - "${PORT_STT:-8001}:8001"

services:
  # --------------------------------------------------------
  # PROFILE: GPU
  # --------------------------------------------------------
  superbot-gpu:
    <<: *base
    container_name: superbot_engine_gpu
    profiles: ["gpu"]
    volumes:
      - ./${CONFIG_PATH}:/app/config/superbot_config.json:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --------------------------------------------------------
  # PROFILE: CPU
  # --------------------------------------------------------
  superbot-cpu:
    <<: *base
    container_name: superbot_engine_cpu
    profiles: ["cpu"]
    environment:
      - LD_LIBRARY_PATH=/usr/lib:/usr/local/cuda/lib64/stubs
    volumes:
      - ./${CONFIG_PATH}:/app/config/superbot_config.json:ro
      #- /usr/local/cuda/lib64/stubs/libcuda.so:/usr/lib/libcuda.so.1:ro