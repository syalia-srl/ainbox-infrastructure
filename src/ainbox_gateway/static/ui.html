<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AInBox engine · loadout</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    color-scheme: dark;
    --void:#0b0d10; --panel:#14181e; --panel-2:#1a1f28; --edge:#2a313b;
    --ink:#eaedf2; --mute:#828d9c; --faint:#5a6472;
    --signal:#f5a623; --signal-dim:#5c4a26;
    --cool:#5cc8d7; --cool-dim:#24484f;
    --live:#3ecf8e; --warn:#e5534b;
    --disp:'Space Grotesk', system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 85% -10%, #171c24 0%, transparent 60%),
      var(--void);
    color:var(--ink); font-family:var(--disp);
    -webkit-font-smoothing:antialiased;
  }

  /* ---- header / relaunch bar ---- */
  header {
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:18px;
    padding:16px 26px; background:rgba(11,13,16,.86);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--edge);
  }
  .mark { display:flex; align-items:center; gap:11px; }
  .glyph {
    width:26px; height:26px; border-radius:7px;
    background:linear-gradient(150deg, var(--signal), #d1741a);
    box-shadow:0 0 0 1px #00000040, 0 6px 18px -6px var(--signal);
    display:grid; place-items:center; color:#1a1204; font-weight:700;
    font-family:var(--mono); font-size:14px;
  }
  .mark h1 { margin:0; font-size:16px; font-weight:600; letter-spacing:.2px; }
  .eyebrow {
    font-family:var(--mono); font-size:10.5px; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--faint); margin-top:1px;
  }
  .spacer { flex:1; }
  .live-count {
    font-family:var(--mono); font-size:11.5px; color:var(--mute);
    letter-spacing:.4px; text-align:right; line-height:1.35;
  }
  .live-count b { color:var(--live); font-weight:700; }
  .relaunch {
    font-family:var(--disp); font-weight:600; font-size:14px;
    border:1px solid var(--edge); border-radius:9px; padding:11px 18px;
    background:var(--panel-2); color:var(--mute); cursor:not-allowed;
    display:flex; align-items:center; gap:9px; transition:all .18s ease;
  }
  .relaunch .n {
    font-family:var(--mono); font-size:12px; font-weight:700;
    background:#00000030; border-radius:6px; padding:1px 7px;
  }
  .relaunch.dirty {
    cursor:pointer; color:#1a1204; border-color:transparent;
    background:linear-gradient(150deg, var(--signal), #e08d1a);
    box-shadow:0 8px 26px -10px var(--signal);
  }
  .relaunch.dirty:hover { filter:brightness(1.07); }
  .relaunch.busy { opacity:.7; cursor:wait; }

  /* ---- rails ---- */
  main { max-width:1180px; margin:0 auto; padding:26px 26px 80px; }
  .rail { margin-bottom:30px; }
  .rail-head {
    display:flex; align-items:baseline; gap:12px; margin-bottom:13px;
    padding-bottom:9px; border-bottom:1px solid var(--edge);
  }
  .rail-head .kind {
    font-family:var(--mono); font-size:11px; letter-spacing:2px;
    text-transform:uppercase; color:var(--signal); font-weight:700;
  }
  .rail-head .desc { font-size:13px; color:var(--mute); }
  .rail-head .count { font-family:var(--mono); font-size:11px; color:var(--faint); }
  .add {
    margin-left:auto; position:relative;
    font-family:var(--mono); font-size:12px; color:var(--cool);
    background:transparent; border:1px dashed var(--cool-dim); border-radius:8px;
    padding:6px 12px; cursor:pointer; transition:all .15s ease;
  }
  .add:hover { border-color:var(--cool); background:#5cc8d70d; }

  .modules { display:flex; flex-wrap:wrap; gap:14px; }
  .module {
    width:262px; background:var(--panel); border:1px solid var(--edge);
    border-radius:12px; padding:14px 15px 13px; position:relative;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  .module.pending {
    border-color:var(--signal-dim);
    box-shadow:0 0 0 1px var(--signal-dim), 0 10px 30px -18px var(--signal);
  }
  .m-top { display:flex; align-items:center; gap:9px; margin-bottom:12px; }
  .dot { width:9px; height:9px; border-radius:50%; flex:none;
         background:var(--live); box-shadow:0 0 10px -1px var(--live); }
  .module.pending .dot {
    background:var(--signal); box-shadow:0 0 10px -1px var(--signal);
    animation:pulse 1.7s ease-in-out infinite;
  }
  .slug { font-family:var(--mono); font-size:14px; font-weight:700;
          color:var(--ink); letter-spacing:-.2px; overflow:hidden;
          text-overflow:ellipsis; white-space:nowrap; }
  .rm { margin-left:auto; width:22px; height:22px; border-radius:6px;
        border:0; background:transparent; color:var(--faint); cursor:pointer;
        font-size:15px; line-height:1; transition:all .15s ease; flex:none; }
  .rm:hover { background:#e5534b1a; color:var(--warn); }

  .ctl { display:flex; align-items:center; justify-content:space-between;
         gap:10px; padding:6px 0; }
  .ctl + .ctl { border-top:1px solid #ffffff08; }
  .ctl label { font-size:12px; color:var(--mute); }
  .val { font-family:var(--mono); font-size:12.5px; color:var(--ink); }

  .stepper { display:flex; align-items:center; gap:2px; }
  .stepper button {
    width:24px; height:24px; border:1px solid var(--edge); background:var(--panel-2);
    color:var(--cool); border-radius:6px; cursor:pointer; font-size:14px;
    line-height:1; font-family:var(--mono); transition:all .12s ease;
  }
  .stepper button:hover { border-color:var(--cool); }
  .stepper .num { width:30px; text-align:center; font-family:var(--mono);
                  font-size:13px; font-weight:700; }

  select.pick {
    font-family:var(--mono); font-size:12px; color:var(--ink);
    background:var(--panel-2); border:1px solid var(--edge); border-radius:6px;
    padding:4px 8px; cursor:pointer; max-width:130px;
  }
  select.pick:hover { border-color:var(--cool); }

  .toggle {
    width:40px; height:22px; border-radius:99px; border:1px solid var(--edge);
    background:var(--panel-2); position:relative; cursor:pointer; flex:none;
    transition:all .18s ease;
  }
  .toggle::after {
    content:""; position:absolute; top:2px; left:2px; width:16px; height:16px;
    border-radius:50%; background:var(--faint); transition:all .18s ease;
  }
  .toggle.on { background:var(--cool-dim); border-color:var(--cool); }
  .toggle.on::after { left:20px; background:var(--cool); }

  .empty { font-size:13px; color:var(--faint); font-family:var(--mono);
           padding:14px 2px; }

  /* add-menu popover */
  .menu {
    position:absolute; top:calc(100% + 6px); right:0; z-index:30;
    background:var(--panel-2); border:1px solid var(--edge); border-radius:10px;
    padding:6px; min-width:190px; box-shadow:0 20px 50px -18px #000;
  }
  .menu button {
    display:block; width:100%; text-align:left; font-family:var(--mono);
    font-size:12.5px; color:var(--ink); background:transparent; border:0;
    padding:8px 10px; border-radius:7px; cursor:pointer;
  }
  .menu button:hover { background:#5cc8d714; color:var(--cool); }
  .menu button[disabled] { color:var(--faint); cursor:default; }
  .menu button[disabled]:hover { background:transparent; }

  #toast {
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--panel-2); border:1px solid var(--edge); border-radius:10px;
    padding:11px 18px; font-family:var(--mono); font-size:12.5px; color:var(--ink);
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:40;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.err { border-color:var(--warn); color:#ffb3ae; }
  #toast.ok  { border-color:var(--live); color:#a9f0cf; }

  a.rawlink { color:var(--faint); font-family:var(--mono); font-size:11px;
              text-decoration:none; border-bottom:1px dotted var(--faint); }
  a.rawlink:hover { color:var(--cool); border-color:var(--cool); }

  :focus-visible { outline:2px solid var(--cool); outline-offset:2px; }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
</style>
</head>
<body>
<header>
  <div class="mark">
    <div class="glyph">◧</div>
    <div>
      <h1>AInBox engine</h1>
      <div class="eyebrow">loadout · fixed residency</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="live-count" id="livecount">—</div>
  <button class="relaunch" id="relaunch" disabled>
    <span id="rlabel">Live</span><span class="n" id="rn" hidden>0</span>
  </button>
</header>

<main id="board"></main>
<div id="toast"></div>

<script>
const ORDER = ["llm","embeddings","stt","tts","images"];
const META = {
  llm:        {kind:"LLM",        desc:"language models"},
  embeddings: {kind:"Embeddings", desc:"vectors"},
  stt:        {kind:"STT",        desc:"speech to text"},
  tts:        {kind:"TTS",        desc:"text to speech"},
  images:     {kind:"Images",     desc:"image generation"},
};
// catalog of baked models the operator can raise (grounded in the recipe)
const CATALOG = {
  llm: { "qwen3.5-9b":{}, "qwen3.5-4b":{}, "qwen3.5-2b":{} },
  embeddings: { "text-embedding-minilm":{model:"paraphrase-multilingual-MiniLM-L12-v2"} },
  stt: { "whisper-small":{model:"small"}, "whisper-tiny":{model:"tiny"} },
  tts: { "kokoro":{model:"kokoro", voices:["af_heart","af_bella","ef_dora","em_alex","ff_siwis"]} },
  images: { "flux":{model:"black-forest-labs/FLUX.1-schnell"} },
};
const CTX = [2048, 4096, 8192, 16384];
const QUANT = ["fp8","bf16"];

let state = blank();   // working copy (control-shape)
let live = blank();    // last-applied snapshot
function blank(){ return {llm:[],embeddings:[],stt:[],tts:[],images:[]}; }
const $ = s => document.querySelector(s);

// ---- normalize raw spec (from /api/spec) -> control-shape ----
function fromRaw(raw){
  const s = blank();
  (raw.llm||[]).forEach(n => s.llm.push({slug:n.slug, replicas:n.replicas??1,
    n_ctx:n.n_ctx??4096, flash_attn:!!n.flash_attn}));
  (raw.embeddings||[]).forEach(n => s.embeddings.push({slug:n.slug, device:n.device||"cuda"}));
  (raw.stt||[]).forEach(n => s.stt.push({slug:n.slug, device:n.device||"cuda"}));
  (raw.tts||[]).forEach(n => s.tts.push({slug:n.slug, voice:n.voice||"af_heart"}));
  (raw.images||[]).forEach(n => s.images.push({slug:n.slug, offload:!!n.offload,
    quant:n.quant||"fp8", steps:n.steps??4}));
  return s;
}
// ---- serialize control-shape -> raw spec (for POST) ----
function toRaw(s){
  const raw = {gateway:{port:8080}};
  raw.llm = s.llm.map(m => ({slug:m.slug, replicas:m.replicas, n_ctx:m.n_ctx,
    n_gpu_layers:-1, flash_attn:m.flash_attn}));
  raw.embeddings = s.embeddings.map(m => ({slug:m.slug,
    model:CATALOG.embeddings[m.slug]?.model||m.slug, device:m.device}));
  raw.stt = s.stt.map(m => ({slug:m.slug, model:CATALOG.stt[m.slug]?.model||"small",
    device:m.device}));
  raw.tts = s.tts.map(m => ({slug:m.slug, model:"kokoro", lang_code:m.voice[0], voice:m.voice}));
  raw.images = s.images.map(m => ({slug:m.slug,
    model:CATALOG.images[m.slug]?.model||m.slug, offload:m.offload, quant:m.quant, steps:m.steps}));
  return raw;
}
const eq = (a,b) => JSON.stringify(a)===JSON.stringify(b);
function moduleState(mod, slug){ return (mod||[]).find(m=>m.slug===slug); }
function isPending(kind, m){
  const l = moduleState(live[kind], m.slug);
  return !l || !eq(l, m);
}
function changeCount(){
  let n = 0;
  for(const k of ORDER){
    for(const m of state[k]) if(isPending(k,m)) n++;
    for(const l of live[k]) if(!moduleState(state[k], l.slug)) n++; // removed
  }
  return n;
}

// ---- render ----
function render(){
  const board = $("#board"); board.innerHTML = "";
  for(const kind of ORDER){
    const rail = document.createElement("section"); rail.className = "rail";
    const items = Object.keys(CATALOG[kind]);
    const present = new Set(state[kind].map(m=>m.slug));
    rail.innerHTML = `
      <div class="rail-head">
        <span class="kind">${META[kind].kind}</span>
        <span class="desc">${META[kind].desc}</span>
        <span class="count">${state[kind].length}/${items.length}</span>
      </div>`;
    const head = rail.querySelector(".rail-head");
    const add = document.createElement("button");
    add.className = "add"; add.textContent = "+ add";
    add.onclick = e => openMenu(e, kind, items, present);
    head.appendChild(add);

    const mods = document.createElement("div"); mods.className = "modules";
    if(state[kind].length === 0){
      mods.innerHTML = `<div class="empty">Nothing raised — <em>+ add</em> a model.</div>`;
    } else {
      state[kind].forEach((m,i) => mods.appendChild(card(kind, m, i)));
    }
    rail.appendChild(mods);
    board.appendChild(rail);
  }
  refreshBar();
}

function card(kind, m, i){
  const el = document.createElement("div");
  el.className = "module" + (isPending(kind,m) ? " pending" : "");
  const top = document.createElement("div"); top.className = "m-top";
  top.innerHTML = `<span class="dot"></span><span class="slug" title="${m.slug}">${m.slug}</span>`;
  const rm = document.createElement("button");
  rm.className = "rm"; rm.textContent = "×"; rm.title = "remove";
  rm.onclick = () => { state[kind].splice(i,1); render(); };
  top.appendChild(rm); el.appendChild(top);
  BODY[kind](el, m);
  return el;
}

// per-modality control bodies
const BODY = {
  llm(el,m){
    el.appendChild(stepper("replicas", m.replicas, 1, 4, v=>{m.replicas=v;render();}));
    el.appendChild(select("context", CTX, m.n_ctx, v=>{m.n_ctx=+v;render();}, x=>x));
    el.appendChild(toggle("flash-attn", m.flash_attn, v=>{m.flash_attn=v;render();}));
  },
  embeddings(el,m){
    el.appendChild(select("device", ["cuda","cpu"], m.device, v=>{m.device=v;render();}));
    el.appendChild(ro("model", CATALOG.embeddings[m.slug]?.model || "—"));
  },
  stt(el,m){
    el.appendChild(select("device", ["cuda","cpu"], m.device, v=>{m.device=v;render();}));
    el.appendChild(ro("model", CATALOG.stt[m.slug]?.model || "—"));
  },
  tts(el,m){
    const voices = CATALOG.tts.kokoro.voices;
    el.appendChild(select("voice", voices, m.voice, v=>{m.voice=v;render();}));
    el.appendChild(ro("lang", m.voice[0]));
  },
  images(el,m){
    el.appendChild(toggle("cpu offload", m.offload, v=>{m.offload=v;render();}));
    el.appendChild(select("quant", QUANT, m.quant, v=>{m.quant=v;render();}));
    el.appendChild(stepper("steps", m.steps, 1, 8, v=>{m.steps=v;render();}));
  },
};

// ---- control factories ----
function row(label){ const r=document.createElement("div"); r.className="ctl";
  r.innerHTML=`<label>${label}</label>`; return r; }
function ro(label,v){ const r=row(label); const s=document.createElement("span");
  s.className="val"; s.textContent=v; r.appendChild(s); return r; }
function stepper(label,v,min,max,cb){
  const r=row(label); const w=document.createElement("div"); w.className="stepper";
  const dec=document.createElement("button"); dec.textContent="−";
  const num=document.createElement("span"); num.className="num"; num.textContent=v;
  const inc=document.createElement("button"); inc.textContent="+";
  dec.onclick=()=>cb(Math.max(min,v-1)); inc.onclick=()=>cb(Math.min(max,v+1));
  w.append(dec,num,inc); r.appendChild(w); return r;
}
function select(label,opts,val,cb,fmt){
  const r=row(label); const sel=document.createElement("select"); sel.className="pick";
  opts.forEach(o=>{ const op=document.createElement("option");
    op.value=o; op.textContent=fmt?fmt(o):o; if(String(o)===String(val)) op.selected=true;
    sel.appendChild(op); });
  sel.onchange=()=>cb(sel.value); r.appendChild(sel); return r;
}
function toggle(label,on,cb){
  const r=row(label); const t=document.createElement("div");
  t.className="toggle"+(on?" on":""); t.tabIndex=0; t.setAttribute("role","switch");
  t.setAttribute("aria-checked",on);
  const flip=()=>cb(!on); t.onclick=flip;
  t.onkeydown=e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();} };
  r.appendChild(t); return r;
}

// ---- add menu ----
function openMenu(e, kind, items, present){
  e.stopPropagation(); closeMenu();
  const menu=document.createElement("div"); menu.className="menu";
  items.forEach(slug=>{
    const b=document.createElement("button"); b.textContent=slug;
    if(present.has(slug)){ b.disabled=true; b.textContent=slug+"  · raised"; }
    else b.onclick=()=>{ addModule(kind,slug); closeMenu(); render(); };
    menu.appendChild(b);
  });
  e.currentTarget.appendChild(menu);
  setTimeout(()=>document.addEventListener("click", closeMenu, {once:true}),0);
}
function closeMenu(){ document.querySelectorAll(".menu").forEach(m=>m.remove()); }
function addModule(kind, slug){
  const d = {
    llm:{slug, replicas:1, n_ctx:4096, flash_attn:false},
    embeddings:{slug, device:"cuda"},
    stt:{slug, device:"cuda"},
    tts:{slug, voice:CATALOG.tts.kokoro.voices[0]},
    images:{slug, offload:false, quant:"fp8", steps:4},
  }[kind];
  state[kind].push(d);
}

// ---- relaunch bar ----
function refreshBar(){
  const n = changeCount();
  const btn=$("#relaunch"), rl=$("#rlabel"), rn=$("#rn");
  const liveN = ORDER.reduce((a,k)=>a+live[k].length,0);
  $("#livecount").innerHTML = `<b>${liveN}</b> models live · ${ORDER.length} modalities`;
  if(n>0){ btn.classList.add("dirty"); btn.disabled=false;
    rl.textContent="Relaunch"; rn.hidden=false; rn.textContent=n; }
  else { btn.classList.remove("dirty"); btn.disabled=true;
    rl.textContent="Live"; rn.hidden=true; }
}
async function relaunch(){
  const btn=$("#relaunch");
  if(btn.disabled) return;
  if(state.llm.length===0){ toast("Raise at least one language model.","err"); return; }
  btn.classList.add("busy"); btn.disabled=true; $("#rlabel").textContent="Relaunching…";
  try{
    const r = await fetch("/api/spec",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify(toRaw(state))});
    const data = await r.json();
    if(!r.ok){ toast(data.error||"relaunch failed","err"); }
    else { live = JSON.parse(JSON.stringify(state)); toast("Relaunched.","ok"); }
  }catch(err){ toast("network error","err"); }
  btn.classList.remove("busy"); render();
}
function toast(msg,kind){
  const t=$("#toast"); t.textContent=msg; t.className="show "+(kind||"");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.className="",2600);
}

// ---- boot ----
$("#relaunch").onclick = relaunch;
(async function boot(){
  try{
    const raw = await (await fetch("/api/spec")).json();
    state = fromRaw(raw); live = JSON.parse(JSON.stringify(state));
  }catch(e){ /* empty board */ }
  render();
})();
</script>
</body>
</html>
