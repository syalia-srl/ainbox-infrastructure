<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SYALIA · Engine</title>
<link rel="icon" href="/syalia-ui/favicon.svg"/>
<link rel="stylesheet" href="/syalia-ui/syalia-ui.css"/>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; background:var(--bg-deep); color:var(--text); }
  body {
    background:
      radial-gradient(1100px 520px at 88% -12%, rgba(129,140,248,.10) 0%, transparent 62%),
      var(--bg-deep);
  }

  /* ---- header / relaunch bar ---- */
  header {
    position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:16px;
    padding:14px 26px; background:rgba(2,6,23,.82); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .brandmark { width:30px; height:30px; border-radius:8px; flex:none;
               box-shadow:0 0 0 1px #00000050, 0 8px 20px -8px rgba(129,140,248,.5); }
  .titles h1 { margin:0; font-size:15px; font-weight:600; display:flex;
               align-items:baseline; gap:7px; }
  .titles .eyebrow { font-family:var(--font-mono); font-size:10px; letter-spacing:2px;
                     text-transform:uppercase; color:var(--text-faint); margin-top:2px; }
  .spacer { flex:1; }
  .live-count { font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim);
                text-align:right; line-height:1.4; }
  .live-count b { color:var(--ok); font-weight:700; }
  .relaunch {
    font-family:var(--font-sans); font-weight:600; font-size:14px;
    border:1px solid var(--border); border-radius:var(--radius); padding:10px 16px;
    background:var(--surface); color:var(--text-dim); cursor:not-allowed;
    display:flex; align-items:center; gap:8px; transition:all .16s ease;
  }
  .relaunch .material-icons { font-size:18px; }
  .relaunch .n { font-family:var(--font-mono); font-size:12px; font-weight:700;
                 background:rgba(255,255,255,.16); border-radius:6px; padding:1px 7px; }
  .relaunch.dirty { cursor:pointer; color:#fff; border-color:transparent;
                    background:var(--accent); box-shadow:0 8px 24px -10px var(--accent); }
  .relaunch.dirty:hover { background:var(--accent-hi); }
  .relaunch.busy { opacity:.65; cursor:wait; }

  /* ---- rails ---- */
  main { max-width:1180px; margin:0 auto; padding:24px 26px 80px; }
  .rail { margin-bottom:28px; }
  .rail-head { display:flex; align-items:baseline; gap:11px; margin-bottom:13px;
               padding-bottom:9px; border-bottom:1px solid var(--border); }
  .rail-head .kind { font-family:var(--font-mono); font-size:11px; letter-spacing:1.5px;
                     text-transform:uppercase; color:var(--accent-hi); font-weight:700; }
  .rail-head .desc { font-size:13px; color:var(--text-dim); }
  .rail-head .count { font-family:var(--font-mono); font-size:11px; color:var(--text-faint); }
  .add { margin-left:auto; position:relative; display:inline-flex; align-items:center; gap:5px;
         font-family:var(--font-sans); font-size:12.5px; color:var(--accent-hi);
         background:transparent; border:1px dashed var(--border-hi); border-radius:var(--radius);
         padding:6px 11px; cursor:pointer; transition:all .15s ease; }
  .add:hover { border-color:var(--accent-hi); background:var(--accent-lo); }
  .add .material-icons { font-size:16px; }

  .modules { display:flex; flex-wrap:wrap; gap:14px; }
  .module { width:264px; background:var(--surface); border:1px solid var(--border);
            border-radius:10px; padding:13px 15px 12px; transition:all .18s ease; }
  .module.pending { border-color:var(--warn);
                    box-shadow:0 0 0 1px rgba(251,191,36,.35), 0 12px 30px -20px var(--warn); }
  .m-top { display:flex; align-items:center; gap:9px; margin-bottom:11px; }
  .dot { width:8px; height:8px; border-radius:50%; flex:none;
         background:var(--ok); box-shadow:0 0 9px -1px var(--ok); }
  .module.pending .dot { background:var(--warn); box-shadow:0 0 9px -1px var(--warn);
                         animation:pulse 1.7s ease-in-out infinite; }
  .slug { font-family:var(--font-mono); font-size:13.5px; font-weight:700; color:var(--text);
          overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rm { margin-left:auto; width:22px; height:22px; border-radius:6px; border:0; flex:none;
        background:transparent; color:var(--text-faint); cursor:pointer;
        display:grid; place-items:center; transition:all .15s ease; }
  .rm .material-icons { font-size:17px; }
  .rm:hover { background:rgba(248,113,113,.14); color:var(--err); }

  .ctl { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 0; }
  .ctl + .ctl { border-top:1px solid rgba(255,255,255,.05); }
  .ctl label { font-size:12px; color:var(--text-dim); }
  .val { font-family:var(--font-mono); font-size:12px; color:var(--text); }

  .stepper { display:flex; align-items:center; gap:3px; }
  .stepper button { width:24px; height:24px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--accent-hi); border-radius:6px; cursor:pointer;
    font-family:var(--font-mono); font-size:14px; line-height:1; transition:all .12s ease; }
  .stepper button:hover { border-color:var(--accent-hi); }
  .stepper .num { width:28px; text-align:center; font-family:var(--font-mono);
                  font-size:13px; font-weight:700; }

  select.pick { font-family:var(--font-mono); font-size:12px; color:var(--text);
    background:var(--surface-2); border:1px solid var(--border); border-radius:6px;
    padding:4px 8px; cursor:pointer; max-width:132px; }
  select.pick:hover { border-color:var(--accent-hi); }

  .toggle { width:38px; height:21px; border-radius:99px; border:1px solid var(--border);
    background:var(--surface-2); position:relative; cursor:pointer; flex:none; transition:all .18s ease; }
  .toggle::after { content:""; position:absolute; top:2px; left:2px; width:15px; height:15px;
    border-radius:50%; background:var(--text-faint); transition:all .18s ease; }
  .toggle.on { background:var(--accent-lo); border-color:var(--accent-hi); }
  .toggle.on::after { left:19px; background:var(--accent-hi); }

  .empty { font-size:13px; color:var(--text-faint); font-family:var(--font-mono); padding:12px 2px; }
  .empty em { color:var(--accent-hi); font-style:normal; }

  .menu { position:absolute; top:calc(100% + 6px); right:0; z-index:30;
    background:var(--surface-2); border:1px solid var(--border-hi); border-radius:10px;
    padding:6px; min-width:196px; box-shadow:0 24px 54px -20px #000; }
  .menu button { display:block; width:100%; text-align:left; font-family:var(--font-mono);
    font-size:12.5px; color:var(--text); background:transparent; border:0; padding:8px 10px;
    border-radius:7px; cursor:pointer; }
  .menu button:hover { background:var(--accent-lo); color:var(--accent-hi); }
  .menu button[disabled] { color:var(--text-faint); cursor:default; }
  .menu button[disabled]:hover { background:transparent; }

  #toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--border-hi); border-radius:10px;
    padding:11px 18px; font-family:var(--font-mono); font-size:12.5px; color:var(--text);
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:40; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.err { border-color:var(--err); color:#fecaca; }
  #toast.ok  { border-color:var(--ok); color:#bbf7d0; }

  :focus-visible { outline:2px solid var(--accent-hi); outline-offset:2px; }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
</style>
</head>
<body>
<header>
  <img class="brandmark" src="/syalia-ui/favicon.svg" alt="SYALIA"/>
  <div class="titles">
    <h1><span class="syalia-wordmark">SYALIA</span><span class="syalia-appname">· Engine</span></h1>
    <div class="eyebrow">loadout · fixed residency</div>
  </div>
  <div class="spacer"></div>
  <div class="live-count" id="livecount">—</div>
  <button class="relaunch" id="relaunch" disabled>
    <span class="material-icons" id="ricon">bolt</span>
    <span id="rlabel">Live</span><span class="n" id="rn" hidden>0</span>
  </button>
</header>

<main id="board"></main>
<div id="toast"></div>

<script>
const ORDER = ["llm","embeddings","stt","tts","images"];
const META = {
  llm:        {kind:"LLM",        desc:"language models"},
  embeddings: {kind:"Embeddings", desc:"vectors"},
  stt:        {kind:"STT",        desc:"speech to text"},
  tts:        {kind:"TTS",        desc:"text to speech"},
  images:     {kind:"Images",     desc:"image generation"},
};
const CATALOG = {
  llm: { "qwen3.5-9b":{}, "qwen3.5-4b":{}, "qwen3.5-2b":{}, "qwen3.5-0.8b":{} },
  embeddings: { "text-embedding-minilm":{model:"paraphrase-multilingual-MiniLM-L12-v2"} },
  stt: { "whisper-small":{model:"small"}, "whisper-tiny":{model:"tiny"} },
  tts: { "kokoro":{model:"kokoro", voices:["af_heart","af_bella","ef_dora","em_alex","ff_siwis"]} },
  images: { "flux":{model:"black-forest-labs/FLUX.1-schnell"} },
};
const CTX = [2048, 4096, 8192, 16384];
const QUANT = ["fp8","bf16"];

let state = blank(), live = blank();
function blank(){ return {llm:[],embeddings:[],stt:[],tts:[],images:[]}; }
const $ = s => document.querySelector(s);

function fromRaw(raw){
  const s = blank();
  (raw.llm||[]).forEach(n => s.llm.push({slug:n.slug, replicas:n.replicas??1,
    n_ctx:n.n_ctx??4096, flash_attn:!!n.flash_attn}));
  (raw.embeddings||[]).forEach(n => s.embeddings.push({slug:n.slug, device:n.device||"cuda"}));
  (raw.stt||[]).forEach(n => s.stt.push({slug:n.slug, device:n.device||"cuda"}));
  (raw.tts||[]).forEach(n => s.tts.push({slug:n.slug, voice:n.voice||"af_heart"}));
  (raw.images||[]).forEach(n => s.images.push({slug:n.slug, offload:!!n.offload,
    quant:n.quant||"fp8", steps:n.steps??4}));
  return s;
}
function toRaw(s){
  const raw = {gateway:{port:8080}};
  raw.llm = s.llm.map(m => ({slug:m.slug, replicas:m.replicas, n_ctx:m.n_ctx,
    n_gpu_layers:-1, flash_attn:m.flash_attn}));
  raw.embeddings = s.embeddings.map(m => ({slug:m.slug,
    model:CATALOG.embeddings[m.slug]?.model||m.slug, device:m.device}));
  raw.stt = s.stt.map(m => ({slug:m.slug, model:CATALOG.stt[m.slug]?.model||"small", device:m.device}));
  raw.tts = s.tts.map(m => ({slug:m.slug, model:"kokoro", lang_code:m.voice[0], voice:m.voice}));
  raw.images = s.images.map(m => ({slug:m.slug,
    model:CATALOG.images[m.slug]?.model||m.slug, offload:m.offload, quant:m.quant, steps:m.steps}));
  return raw;
}
const eq = (a,b) => JSON.stringify(a)===JSON.stringify(b);
const moduleState = (mod, slug) => (mod||[]).find(m=>m.slug===slug);
function isPending(kind, m){ const l = moduleState(live[kind], m.slug); return !l || !eq(l, m); }
function changeCount(){
  let n = 0;
  for(const k of ORDER){
    for(const m of state[k]) if(isPending(k,m)) n++;
    for(const l of live[k]) if(!moduleState(state[k], l.slug)) n++;
  }
  return n;
}

function render(){
  const board = $("#board"); board.innerHTML = "";
  for(const kind of ORDER){
    const rail = document.createElement("section"); rail.className = "rail";
    const items = Object.keys(CATALOG[kind]);
    const present = new Set(state[kind].map(m=>m.slug));
    rail.innerHTML = `<div class="rail-head">
        <span class="kind">${META[kind].kind}</span>
        <span class="desc">${META[kind].desc}</span>
        <span class="count">${state[kind].length}/${items.length}</span></div>`;
    const add = document.createElement("button");
    add.className = "add";
    add.innerHTML = `<span class="material-icons">add</span>add`;
    add.onclick = e => openMenu(e, kind, items, present);
    rail.querySelector(".rail-head").appendChild(add);

    const mods = document.createElement("div"); mods.className = "modules";
    if(state[kind].length === 0)
      mods.innerHTML = `<div class="empty">Nothing raised — <em>add</em> a model.</div>`;
    else state[kind].forEach((m,i) => mods.appendChild(card(kind, m, i)));
    rail.appendChild(mods); board.appendChild(rail);
  }
  refreshBar();
}
function card(kind, m, i){
  const el = document.createElement("div");
  el.className = "module" + (isPending(kind,m) ? " pending" : "");
  const top = document.createElement("div"); top.className = "m-top";
  top.innerHTML = `<span class="dot"></span><span class="slug" title="${m.slug}">${m.slug}</span>`;
  const rm = document.createElement("button"); rm.className = "rm"; rm.title = "remove";
  rm.innerHTML = `<span class="material-icons">close</span>`;
  rm.onclick = () => { state[kind].splice(i,1); render(); };
  top.appendChild(rm); el.appendChild(top); BODY[kind](el, m); return el;
}
const BODY = {
  llm(el,m){
    el.appendChild(stepper("replicas", m.replicas, 1, 4, v=>{m.replicas=v;render();}));
    el.appendChild(select("context", CTX, m.n_ctx, v=>{m.n_ctx=+v;render();}));
    el.appendChild(toggle("flash-attn", m.flash_attn, v=>{m.flash_attn=v;render();}));
  },
  embeddings(el,m){
    el.appendChild(select("device", ["cuda","cpu"], m.device, v=>{m.device=v;render();}));
    el.appendChild(ro("model", CATALOG.embeddings[m.slug]?.model || "—"));
  },
  stt(el,m){
    el.appendChild(select("device", ["cuda","cpu"], m.device, v=>{m.device=v;render();}));
    el.appendChild(ro("model", CATALOG.stt[m.slug]?.model || "—"));
  },
  tts(el,m){
    el.appendChild(select("voice", CATALOG.tts.kokoro.voices, m.voice, v=>{m.voice=v;render();}));
    el.appendChild(ro("lang", m.voice[0]));
  },
  images(el,m){
    el.appendChild(toggle("cpu offload", m.offload, v=>{m.offload=v;render();}));
    el.appendChild(select("quant", QUANT, m.quant, v=>{m.quant=v;render();}));
    el.appendChild(stepper("steps", m.steps, 1, 8, v=>{m.steps=v;render();}));
  },
};
function row(label){ const r=document.createElement("div"); r.className="ctl";
  r.innerHTML=`<label>${label}</label>`; return r; }
function ro(label,v){ const r=row(label); const s=document.createElement("span");
  s.className="val"; s.textContent=v; r.appendChild(s); return r; }
function stepper(label,v,min,max,cb){
  const r=row(label); const w=document.createElement("div"); w.className="stepper";
  const dec=document.createElement("button"); dec.textContent="−";
  const num=document.createElement("span"); num.className="num"; num.textContent=v;
  const inc=document.createElement("button"); inc.textContent="+";
  dec.onclick=()=>cb(Math.max(min,v-1)); inc.onclick=()=>cb(Math.min(max,v+1));
  w.append(dec,num,inc); r.appendChild(w); return r;
}
function select(label,opts,val,cb){
  const r=row(label); const sel=document.createElement("select"); sel.className="pick";
  opts.forEach(o=>{ const op=document.createElement("option"); op.value=o; op.textContent=o;
    if(String(o)===String(val)) op.selected=true; sel.appendChild(op); });
  sel.onchange=()=>cb(sel.value); r.appendChild(sel); return r;
}
function toggle(label,on,cb){
  const r=row(label); const t=document.createElement("div");
  t.className="toggle"+(on?" on":""); t.tabIndex=0; t.setAttribute("role","switch");
  t.setAttribute("aria-checked",on);
  const flip=()=>cb(!on); t.onclick=flip;
  t.onkeydown=e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();} };
  r.appendChild(t); return r;
}
function openMenu(e, kind, items, present){
  e.stopPropagation(); closeMenu();
  const menu=document.createElement("div"); menu.className="menu";
  items.forEach(slug=>{
    const b=document.createElement("button");
    if(present.has(slug)){ b.disabled=true; b.textContent=slug+"  · raised"; }
    else { b.textContent=slug; b.onclick=()=>{ addModule(kind,slug); closeMenu(); render(); }; }
    menu.appendChild(b);
  });
  e.currentTarget.appendChild(menu);
  setTimeout(()=>document.addEventListener("click", closeMenu, {once:true}),0);
}
function closeMenu(){ document.querySelectorAll(".menu").forEach(m=>m.remove()); }
function addModule(kind, slug){
  state[kind].push({
    llm:{slug, replicas:1, n_ctx:4096, flash_attn:false},
    embeddings:{slug, device:"cuda"},
    stt:{slug, device:"cuda"},
    tts:{slug, voice:CATALOG.tts.kokoro.voices[0]},
    images:{slug, offload:false, quant:"fp8", steps:4},
  }[kind]);
}
function refreshBar(){
  const n = changeCount();
  const btn=$("#relaunch"), rl=$("#rlabel"), rn=$("#rn"), ic=$("#ricon");
  const liveN = ORDER.reduce((a,k)=>a+live[k].length,0);
  $("#livecount").innerHTML = `<b>${liveN}</b> models live · ${ORDER.length} modalities`;
  if(n>0){ btn.classList.add("dirty"); btn.disabled=false; ic.textContent="restart_alt";
    rl.textContent="Relaunch"; rn.hidden=false; rn.textContent=n; }
  else { btn.classList.remove("dirty"); btn.disabled=true; ic.textContent="bolt";
    rl.textContent="Live"; rn.hidden=true; }
}
async function relaunch(){
  const btn=$("#relaunch"); if(btn.disabled) return;
  if(state.llm.length===0){ toast("Raise at least one language model.","err"); return; }
  btn.classList.add("busy"); btn.disabled=true; $("#rlabel").textContent="Relaunching…";
  try{
    const r = await fetch("/api/spec",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify(toRaw(state))});
    const data = await r.json();
    if(!r.ok) toast(data.error||"relaunch failed","err");
    else { live = JSON.parse(JSON.stringify(state)); toast("Relaunched.","ok"); }
  }catch(err){ toast("network error","err"); }
  btn.classList.remove("busy"); render();
}
function toast(msg,kind){
  const t=$("#toast"); t.textContent=msg; t.className="show "+(kind||"");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.className="",2600);
}
$("#relaunch").onclick = relaunch;
(async function boot(){
  try{ const raw = await (await fetch("/api/spec")).json();
    state = fromRaw(raw); live = JSON.parse(JSON.stringify(state)); }
  catch(e){}
  render();
})();
</script>
</body>
</html>
